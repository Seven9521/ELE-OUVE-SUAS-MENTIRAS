<style>
body {
    background: black;
    color: #00ff9f;
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

/* 🔴 MODO FINAL */
.modo-final {
    background: #0a0000;
    color: #ff2a2a;
    animation: pulsar 2s infinite;
}

@keyframes pulsar {
    0% { background: #0a0000; }
    50% { background: #1a0000; }
    100% { background: #0a0000; }
}

.modo-final .terminal {
    border: 1px solid #ff2a2a;
    box-shadow: 0 0 20px #ff2a2a55;
}

.modo-final input {
    border-bottom: 1px solid #ff2a2a;
    color: #ff2a2a;
}

.modo-final button {
    border: 1px solid #ff2a2a;
    color: #ff2a2a;
}

.modo-final button:hover {
    background: #ff2a2a;
    color: black;
    box-shadow: 0 0 10px #ff2a2a;
}

.modo-final .titulo {
    color: #ff2a2a;
}

/* TÍTULO */
.titulo {
    margin-bottom: 20px;
    font-size: 20px;
    letter-spacing: 2px;
    opacity: 0.8;
}

/* TERMINAL */
.terminal {
    width: 90%;
    max-width: 700px;
    border: 1px solid #00ff9f;
    padding: 20px;
    box-shadow: 0 0 20px #00ff9f33;
}

/* PERGUNTA */
#pergunta::after {
    content: "_";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* IMAGEM */
#imagem {
    margin-top: 15px;
    max-width: 100%;
    display: none;
}

/* INPUT */
input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #00ff9f;
    color: #00ff9f;
    width: 100%;
    margin-top: 20px;
    font-size: 16px;
    outline: none;
}

/* BOTÃO */
.botao-container {
    display: flex;
    justify-content: center;
}

button {
    margin-top: 15px;
    background: transparent;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    padding: 8px 20px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    transition: 0.2s;
}

button:hover {
    background: #00ff9f;
    color: black;
    box-shadow: 0 0 10px #00ff9f;
}

/* MENSAGEM */
#mensagem {
    margin-top: 15px;
    height: 20px;
}

/* GLITCH */
.glitch {
    animation: glitch 0.15s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(3px, -2px); }
    60% { transform: translate(-2px, -1px); }
    80% { transform: translate(2px, 1px); }
    100% { transform: translate(0); }
}
#pergunta {
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
}
/* ⚫ MODO 22+ */
.modo-absoluto {
    background: black;
    color: #bfbfbf;
}

.modo-absoluto .terminal {
    border: 1px solid #555;
    box-shadow: 0 0 15px #55555555;
}

.modo-absoluto input {
    border-bottom: 1px solid #888;
    color: #ccc;
}

.modo-absoluto button {
    border: 1px solid #888;
    color: #ccc;
}

.modo-absoluto button:hover {
    background: #888;
    color: black;
}
</style>
</head>

            .trim();
    }

        let matriz = [];

        for (let i = 0; i <= b.length; i++) matriz[i] = [i];
        for (let j = 0; j <= a.length; j++) matriz[0][j] = j;

        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b[i - 1] === a[j - 1]) {
                    matriz[i][j] = matriz[i - 1][j - 1];
                } else {
                    matriz[i][j] = Math.min(
                        matriz[i - 1][j - 1] + 1,
                        matriz[i][j - 1] + 1,
                        matriz[i - 1][j] + 1
                    );
                }
            }
        }

        return matriz[b.length][a.length];
    }

    tela.style.zIndex = "9999";

    tela.innerText = "0000";
    document.body.appendChild(tela);

    let inicio = Date.now();
    let duracao = 8000;

    function easeInOut(t) {
        return t < 0.5
            ? 2 * t * t
            : 1 - Math.pow(-2 * t + 2, 5) / 2;
    }

    const intervalo = setInterval(() => {
        let tempo = Date.now() - inicio;
        let progresso = tempo / duracao;

        if (progresso >= 1) {
            progresso = 1;
            clearInterval(intervalo);
        }

        let eased = easeInOut(progresso);
        let numero = Math.floor(eased * 9521);

        tela.innerText = numero.toString().padStart(4, "0");

        if (progresso === 1) {
            setTimeout(() => {
                document.body.removeChild(tela);
                callback();
            }, 1000);
        }

    }, 1);
}

    let tempo = contexto.currentTime;
    const unidade = 0.12;

    for (let letra of frase.toLowerCase()) {
        let codigo = morse[letra];
        if (!codigo) continue;

        if (codigo === '/') {
            tempo += unidade * 7;
            continue;
        }

        for (let simbolo of codigo) {
            if (simbolo === '.') beep(tempo, unidade);
            if (simbolo === '-') beep(tempo, unidade * 3);

            tempo += unidade; // espaço entre sinais
        }

        tempo += unidade * 4; // espaço entre letras
    }
}
function finalFalso() {
    const tela = document.createElement("div");

    tela.style.position = "fixed";
    tela.style.top = 0;
    tela.style.left = 0;
    tela.style.width = "100%";
    tela.style.height = "100%";
    tela.style.background = "black";
    tela.style.color = "#00ff9f";
    tela.style.display = "flex";
    tela.style.flexDirection = "column";
    tela.style.alignItems = "center";
    tela.style.justifyContent = "center";
    tela.style.fontSize = "28px";
    tela.style.fontFamily = "'Share Tech Mono', monospace";
    tela.style.zIndex = "9999";
    tela.style.textAlign = "center";

    document.body.appendChild(tela);

    // sequência de mensagens
    const mensagens = [
        "PROCESSANDO...",
        "VERIFICANDO RESPOSTAS...",
        "ACESSO CONCEDIDO",
        "",
        "Parabéns.",
        "Você concluiu o enigma.",
        "",
        "Encerrando sistema..."
    ];

    let i = 0;

    function proximaMensagem() {
        if (i < mensagens.length) {
            tela.innerText = mensagens[i];
            i++;
            setTimeout(proximaMensagem, 1500);
        } else {

            // quebra de expectativa
            setTimeout(() => {
                tela.style.color = "#ff2a2a";
                tela.innerText = "...\n\nAlgo não está certo.";
            }, 2000);

            setTimeout(() => {
                tela.innerText = "Você chegou longe demais.";
            }, 4000);

            setTimeout(() => {
                tela.innerText = "E mesmo assim... não terminou.";
            }, 6000);

            setTimeout(() => {
                tela.innerText = "O verdadeiro enigma ainda não começou.";
            }, 8000);

            setTimeout(() => {
                tela.innerText = "9521";
            }, 10000);

            // 🔒 trava tudo
            setTimeout(() => {
                document.body.innerHTML = "";
            }, 13000);
        }
    }

    proximaMensagem();
}
